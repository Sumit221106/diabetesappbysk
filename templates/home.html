<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabetes Predictor</title>

<style>
/* ===== GLOBAL FIXES ===== */
*,
*::before,
*::after {
    box-sizing: border-box;
}

html, body {
    width: 100%;
    overflow-x: hidden;
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ===== PAGE BACKGROUND ===== */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #4facfe, #00c6ff);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
}

/* ===== CARD ===== */
.card {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 26px 20px;
    border-radius: 22px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.18);
}

/* ===== HEADER ===== */
.app-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 24px;
    font-weight: 700;
    color: #1f2937;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #6b7280;
    margin: 6px 0 22px;
}

/* ===== INPUTS ===== */
.field {
    margin-bottom: 14px;
}

input[type="number"] {
    width: 100%;
    max-width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 14px;
    border: 1px solid #e5e7eb;
    outline: none;
    background: #f9fafb;
}

input[type="number"]:focus {
    border-color: #00c6ff;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(0,198,255,0.18);
}

/* ===== RADIO GROUPS ===== */
.radio-group {
    margin-bottom: 16px;
}

.radio-group strong {
    font-size: 14px;
    color: #374151;
}

.radio-options {
    margin-top: 8px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
}

.radio-options label {
    display: flex;
    align-items: center;
    font-size: 14px;
    color: #374151;
    cursor: pointer;
}

.radio-options input {
    margin-right: 6px;
    accent-color: #00c6ff;
}

/* ===== BUTTON ===== */
button {
    width: 100%;
    max-width: 100%;
    margin-top: 6px;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #4facfe, #00c6ff);
    color: #ffffff;
    cursor: pointer;
}

button:active {
    transform: scale(0.98);
}

/* ===== NOTE & RESULT ===== */
.note {
    margin-top: 18px;
    font-size: 13px;
    color: #6b7280;
    text-align: center;
    line-height: 1.5;
}

.result {
    margin-top: 14px;
    padding: 12px;
    border-radius: 14px;
    background: #f0f9ff;
    color: #0369a1;
    font-weight: 600;
    text-align: center;
}

/* ===== iOS INPUT FIX ===== */
input[type="number"] {
    -webkit-appearance: none;
    appearance: none;
}
</style>
</head>

<body>

<div class="card">
    <div class="app-title">🩺 Diabetes Predictor</div>
    <div class="subtitle">Check your diabetes risk instantly</div>

    <form method="POST">
        <div class="field">
            <input type="number" name="age" step="0.01" placeholder="Age (years)" required>
        </div>

        <div class="field">
            <input type="number" name="bmi" step="0.01" placeholder="BMI" required>
        </div>

        <div class="field">
            <input type="number" name="fs" step="0.01" placeholder="Fasting Sugar (mg/dL)" required>
        </div>

        <div class="field">
            <input type="number" name="HbA1c" step="0.01" placeholder="HbA1c (%)" required>
        </div>

        <div class="radio-group">
            <strong>Gender</strong>
            <div class="radio-options">
                <label><input type="radio" name="gender" value="1" required> Female</label>
                <label><input type="radio" name="gender" value="2"> Male</label>
            </div>
        </div>

        <div class="radio-group">
            <strong>Hypertension</strong>
            <div class="radio-options">
                <label><input type="radio" name="Hypertension" value="1" required> No</label>
                <label><input type="radio" name="Hypertension" value="2"> Yes</label>
            </div>
        </div>

        <div class="radio-group">
            <strong>Family History of Diabetes</strong>
            <div class="radio-options">
                <label><input type="radio" name="fmly" value="1" required> No</label>
                <label><input type="radio" name="fmly" value="2"> Yes</label>
            </div>
        </div>

        <button type="submit">Predict Risk</button>
    </form>

    <div class="note">
        Our app can make mistakes.  
        Adhik confirmation ke liye apne family doctor se salah zaroor lein.
    </div>

    {% if msg %}
    <div class="result">
        {{ msg }}
    </div>
    {% endif %}
</div>

</body>
</html>
